<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Favorites</title>
    <meta name="description" content="Saved favorites" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top left, rgba(255, 199, 229, 0.45), transparent 55%), radial-gradient(circle at bottom right, rgba(255, 154, 217, 0.4), transparent 55%), linear-gradient(135deg, #420634 0%, #160312 100%);
        padding: clamp(1.5rem, 4vw, 3rem) 1.25rem;
        color: #ffffff;
      }
      .favorites-shell {
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
      }
      .favorites-card {
        background: linear-gradient(135deg, #ff9aed 0%, #ff5ca8 100%);
        border-radius: 1.75rem;
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.35);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(16px);
      }
      .favorites-header {
        padding: clamp(1.5rem, 3vw, 2.5rem);
        border-bottom: 1px solid rgba(255, 255, 255, 0.22);
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .favorites-back {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.85);
      }
      .favorites-back svg {
        width: 1.1rem;
        height: 1.1rem;
      }
      .favorites-title {
        font-family: inherit;
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin: 0;
      }
      .favorites-subtitle {
        font-size: 1rem;
        max-width: 48ch;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.84);
      }
      .favorites-content {
        padding: clamp(1.5rem, 3vw, 2.5rem);
        display: flex;
        flex-direction: column;
        gap: clamp(1.75rem, 3vw, 2.5rem);
      }
      .favorites-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .favorites-empty {
        border: 1px dashed rgba(255, 255, 255, 0.3);
        border-radius: 1.25rem;
        padding: 2.5rem 1.5rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.08);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .favorites-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
      }
      .favorites-item-main {
        display: flex;
        gap: 0.85rem;
        align-items: flex-start;
        flex: 1 1 auto;
      }
      .favorites-item-preview {
        width: 3.4rem;
        height: 3.4rem;
        border-radius: 0.95rem;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.2) 100%);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        flex-shrink: 0;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28), 0 6px 18px rgba(15, 23, 42, 0.25);
      }
      .favorites-item-info {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        flex: 1 1 auto;
        min-width: 0;
      }
      .favorites-item-name {
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ffffff;
        text-decoration: none;
      }
      .favorites-item-name:hover {
        text-decoration: underline;
      }
      .favorites-item-variant {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }
      .favorites-item-description {
        font-size: 0.8rem;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.85);
      }
      .favorites-item-price {
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.95);
      }
      .favorites-item-actions {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-left: auto;
        padding-left: 0.5rem;
      }
      .favorites-move-btn {
        border: none;
        border-radius: 999px;
        width: 2.2rem;
        height: 2.2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(17, 24, 39, 0.65);
        color: #ffffff;
        cursor: pointer;
      }
      .favorites-move-btn:hover {
        background: rgba(17, 24, 39, 0.85);
      }
      .favorites-move-btn:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .favorites-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .favorites-clear-btn {
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.5rem;
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .favorites-clear-btn:hover {
        background: rgba(255, 255, 255, 0.26);
      }
      .favorites-remove-btn {
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.85);
        font-size: 1.25rem;
        line-height: 1;
        padding: 0.25rem;
        border-radius: 999px;
        cursor: pointer;
      }
      .favorites-remove-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        color: #ffffff;
      }
      .favorites-status {
        margin: 0;
        border-radius: 0.85rem;
        padding: 0.75rem 1rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(17, 24, 39, 0.25);
        color: rgba(255, 255, 255, 0.92);
      }
      .favorites-status.is-error {
        border-color: rgba(239, 68, 68, 0.55);
        background: rgba(127, 29, 29, 0.4);
      }
      .empty-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .continue-btn {
        border: none;
        border-radius: 999px;
        padding: 0.85rem 2rem;
        background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .continue-btn svg {
        width: 1rem;
        height: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="favorites-shell">
      <main class="favorites-card" aria-labelledby="favorites-heading">
        <header class="favorites-header">
          <a class="favorites-back" href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Continue Shopping
          </a>
          <div>
            <h1 id="favorites-heading" class="favorites-title">Favorites</h1>
            <p class="favorites-subtitle">Explore your saved items in one place. Remove anything you no longer love or head back to keep browsing.</p>
          </div>
        </header>
        <div class="favorites-content">
          <section class="favorites-list" data-favorites-items aria-live="polite"></section>
          <p class="favorites-status" data-favorites-status hidden></p>
          <div class="favorites-actions" data-favorites-actions hidden>
            <button type="button" class="favorites-clear-btn" data-favorites-clear>Clear Favorites</button>
            <a class="continue-btn" href="index.html">
              Continue Shopping
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 5l7 7-7 7" />
              </svg>
            </a>
          </div>
          <div class="empty-actions" data-favorites-empty-cta hidden>
            <a class="continue-btn" href="index.html">
              Discover Products
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>
      </main>
    </div>
    <script src="favorites.js"></script>
    <script>
      (() => {
        const favoritesApi = window.ldcFavorites;
        const favoritesItemsEl = document.querySelector('[data-favorites-items]');
        const favoritesActionsEl = document.querySelector('[data-favorites-actions]');
        const favoritesEmptyCTA = document.querySelector('[data-favorites-empty-cta]');
        const clearBtn = document.querySelector('[data-favorites-clear]');
        const statusEl = document.querySelector('[data-favorites-status]');

        if (!favoritesApi || !favoritesApi.__sharedStore) {
          if (favoritesItemsEl) {
            favoritesItemsEl.innerHTML = '<div class="favorites-empty">Favorites are unavailable right now.</div>';
          }
          favoritesActionsEl?.setAttribute('hidden', 'true');
          favoritesEmptyCTA?.removeAttribute('hidden');
          return;
        }

        const toText = value => String(value ?? '').trim();
        const escapeHtml = value => toText(value).replace(/[&<>"']/g, char => {
          const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
          return map[char] || char;
        });
        const formatCurrency = (value, currencyCode) => {
          const amount = Number(value ?? 0);
          const safeAmount = Number.isFinite(amount) ? amount : 0;
          const code = toText(currencyCode).toUpperCase() || 'USD';
          try {
            return new Intl.NumberFormat('en-US', {
              style: 'currency',
              currency: code
            }).format(safeAmount);
          } catch {
            return `$${safeAmount.toFixed(2)}`;
          }
        };
        const extractImageFromStyle = style => {
          const value = toText(style);
          if (!value) return '';
          const match = value.match(/url\(["']?(.*?)["']?\)/i);
          return match ? match[1] : '';
        };
        const resolveOptionsSummary = item => {
          if (toText(item.options_summary)) return toText(item.options_summary);
          if (!Array.isArray(item.selected_options)) return '';
          return item.selected_options
            .map(opt => {
              const label = toText(opt?.label);
              const value = toText(opt?.value);
              if (!value) return '';
              return label ? `${label}: ${value}` : value;
            })
            .filter(Boolean)
            .join(' | ');
        };
        const setStatus = (message, isError = false) => {
          if (!statusEl) return;
          const text = toText(message);
          if (!text) {
            statusEl.textContent = '';
            statusEl.setAttribute('hidden', 'true');
            statusEl.classList.remove('is-error');
            return;
          }
          statusEl.textContent = text;
          statusEl.classList.toggle('is-error', Boolean(isError));
          statusEl.removeAttribute('hidden');
        };

        const renderFavorites = () => {
          if (!favoritesItemsEl) return;
          const items = favoritesApi.getFavorites();
          if (!items.length) {
            favoritesItemsEl.innerHTML = '<div class="favorites-empty">No favorites yet.</div>';
            favoritesActionsEl?.setAttribute('hidden', 'true');
            favoritesEmptyCTA?.removeAttribute('hidden');
            setStatus('');
            return;
          }

          const itemsMarkup = items.map(item => {
            const id = escapeHtml(item.id);
            const title = escapeHtml(item.title || 'Favorite');
            const description = escapeHtml(item.short_description || item.description || '');
            const optionsSummary = escapeHtml(resolveOptionsSummary(item) || item.variant_title || '');
            const productUrl = toText(item.product_url);
            const imageUrl = toText(item.preview_image || item.image_url || extractImageFromStyle(item.preview_style));
            const titleMarkup = productUrl
              ? `<a class="favorites-item-name" href="${escapeHtml(productUrl)}">${title}</a>`
              : `<div class="favorites-item-name">${title}</div>`;
            const previewMarkup = imageUrl
              ? `<img src="${escapeHtml(imageUrl)}" alt="${title}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" loading="lazy" />`
              : '';
            return `
            <article class="favorites-item" data-favorite-id="${id}">
              <div class="favorites-item-main">
                <div class="favorites-item-preview">${previewMarkup}</div>
                <div class="favorites-item-info">
                  ${titleMarkup}
                  ${optionsSummary ? `<div class="favorites-item-variant">${optionsSummary}</div>` : ''}
                  ${description ? `<div class="favorites-item-description">${description}</div>` : ''}
                  <div class="favorites-item-price">${formatCurrency(item.price, item.currency_code)}</div>
                </div>
              </div>
              <div class="favorites-item-actions">
                <button type="button" class="favorites-move-btn" data-favorites-page-move aria-label="Move ${title} to cart">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                    <path d="M2.25 2.25a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .728.568l.432 1.864h13.134a.75.75 0 0 1 .732.928l-1.5 6a.75.75 0 0 1-.732.572H8.715l.3 1.5H18a.75.75 0 1 1 0 1.5H8.25a.75.75 0 0 1-.732-.568L5.4 3.75H3a.75.75 0 0 1-.75-.75Zm4.5 16.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Zm9 0a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" />
                  </svg>
                </button>
                <button type="button" class="favorites-remove-btn" data-favorites-page-remove aria-label="Remove ${title}">×</button>
              </div>
            </article>`;
          }).join('');

          favoritesItemsEl.innerHTML = itemsMarkup;
          favoritesActionsEl?.removeAttribute('hidden');
          favoritesEmptyCTA?.setAttribute('hidden', 'true');
        };

        favoritesItemsEl?.addEventListener('click', event => {
          const removeBtn = event.target.closest('[data-favorites-page-remove]');
          if (!removeBtn) return;
          const card = removeBtn.closest('[data-favorite-id]');
          if (!card) return;
          const id = card.getAttribute('data-favorite-id');
          favoritesApi.removeFavorite(id);
        });

        favoritesItemsEl?.addEventListener('click', async event => {
          const moveBtn = event.target.closest('[data-favorites-page-move]');
          if (!moveBtn) return;
          const card = moveBtn.closest('[data-favorite-id]');
          if (!card) return;
          const id = card.getAttribute('data-favorite-id');
          if (!id) return;
          moveBtn.setAttribute('disabled', 'true');
          setStatus('');
          const result = await favoritesApi.moveFavoriteToCart(id, { source: 'favorites-page' });
          moveBtn.removeAttribute('disabled');
          if (result?.ok) {
            setStatus('Item sent to cart');
          } else {
            setStatus(result?.user_message || 'Unable to move item to cart', true);
          }
        });

        clearBtn?.addEventListener('click', () => {
          favoritesApi.clearFavorites();
        });

        const unsubscribe = favoritesApi.subscribe(() => {
          renderFavorites();
        });
        window.addEventListener('beforeunload', () => {
          if (typeof unsubscribe === 'function') unsubscribe();
        }, { once: true });

        renderFavorites();
      })();
    </script>
  </body>
</html>
