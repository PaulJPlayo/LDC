<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Favorites</title>
    <meta name="description" content="Saved favorites" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="favorites-theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body class="favorites-theme-page">
    <div class="favorites-shell">
      <main class="favorites-card" aria-labelledby="favorites-heading">
        <header class="favorites-header">
          <a class="favorites-back" href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Continue Shopping
          </a>
          <div>
            <h1 id="favorites-heading" class="favorites-title">Favorites</h1>
            <p class="favorites-subtitle">Explore your saved items in one place. Remove anything you no longer love or head back to keep browsing.</p>
          </div>
        </header>
        <div class="favorites-content">
          <section class="favorites-list" data-favorites-items aria-live="polite"></section>
          <p class="favorites-status" data-favorites-status hidden></p>
          <div class="favorites-actions" data-favorites-actions hidden>
            <button type="button" class="favorites-clear-btn" data-favorites-clear>Clear Favorites</button>
            <a class="continue-btn" href="index.html">
              Continue Shopping
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 5l7 7-7 7" />
              </svg>
            </a>
          </div>
          <div class="empty-actions" data-favorites-empty-cta hidden>
            <a class="continue-btn" href="index.html">
              Discover Products
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>
      </main>
    </div>
    <script src="favorites.js"></script>
    <script>
      (() => {
        const favoritesApi = window.ldcFavorites;
        const favoritesItemsEl = document.querySelector('[data-favorites-items]');
        const favoritesActionsEl = document.querySelector('[data-favorites-actions]');
        const favoritesEmptyCTA = document.querySelector('[data-favorites-empty-cta]');
        const clearBtn = document.querySelector('[data-favorites-clear]');
        const statusEl = document.querySelector('[data-favorites-status]');

        if (!favoritesApi || !favoritesApi.__sharedStore) {
          if (favoritesItemsEl) {
            favoritesItemsEl.innerHTML = '<div class="favorites-empty">Favorites are unavailable right now.</div>';
          }
          favoritesActionsEl?.setAttribute('hidden', 'true');
          favoritesEmptyCTA?.removeAttribute('hidden');
          return;
        }

        const toText = value => String(value ?? '').trim();
        const escapeHtml = value => toText(value).replace(/[&<>"']/g, char => {
          const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
          return map[char] || char;
        });
        const formatCurrency = (value, currencyCode) => {
          const amount = Number(value ?? 0);
          const safeAmount = Number.isFinite(amount) ? amount : 0;
          const code = toText(currencyCode).toUpperCase() || 'USD';
          try {
            return new Intl.NumberFormat('en-US', {
              style: 'currency',
              currency: code
            }).format(safeAmount);
          } catch {
            return `$${safeAmount.toFixed(2)}`;
          }
        };
        const extractImageFromStyle = style => {
          const value = toText(style);
          if (!value) return '';
          const match = value.match(/url\(["']?(.*?)["']?\)/i);
          return match ? match[1] : '';
        };
        const setStatus = (message, isError = false) => {
          if (!statusEl) return;
          const text = toText(message);
          if (!text) {
            statusEl.textContent = '';
            statusEl.setAttribute('hidden', 'true');
            statusEl.classList.remove('is-error');
            return;
          }
          statusEl.textContent = text;
          statusEl.classList.toggle('is-error', Boolean(isError));
          statusEl.removeAttribute('hidden');
        };

        const renderFavorites = () => {
          if (!favoritesItemsEl) return;
          const items = favoritesApi.getFavorites();
          if (!items.length) {
            favoritesItemsEl.innerHTML = '<div class="favorites-empty">No favorites yet.</div>';
            favoritesActionsEl?.setAttribute('hidden', 'true');
            favoritesEmptyCTA?.removeAttribute('hidden');
            setStatus('');
            return;
          }

          const itemsMarkup = items.map(item => {
            const id = escapeHtml(item.id);
            const title = escapeHtml(item.title || 'Favorite');
            const productUrl = toText(item.product_url);
            const imageUrl = toText(item.preview_image || item.image_url || extractImageFromStyle(item.preview_style));
            const titleMarkup = productUrl
              ? `<a class="favorites-item-name" href="${escapeHtml(productUrl)}">${title}</a>`
              : `<div class="favorites-item-name">${title}</div>`;
            const previewMarkup = imageUrl
              ? `<img src="${escapeHtml(imageUrl)}" alt="${title}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" loading="lazy" />`
              : '';
            const detailRowsMarkup = typeof favoritesApi.renderFavoriteDetailsMarkup === 'function'
              ? favoritesApi.renderFavoriteDetailsMarkup(item)
              : '';
            return `
            <article class="favorites-item" data-favorite-id="${id}">
              <div class="favorites-item-main">
                <div class="favorites-item-preview">${previewMarkup}</div>
                <div class="favorites-item-info">
                  ${titleMarkup}
                  <div class="favorites-item-summary-row">
                    <div class="favorites-item-price">${formatCurrency(item.price, item.currency_code)}</div>
                    <div class="favorites-item-actions">
                      <button type="button" class="favorites-move-btn" data-favorites-page-move aria-label="Move ${title} to cart">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                          <path d="M2.25 2.25a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .728.568l.432 1.864h13.134a.75.75 0 0 1 .732.928l-1.5 6a.75.75 0 0 1-.732.572H8.715l.3 1.5H18a.75.75 0 1 1 0 1.5H8.25a.75.75 0 0 1-.732-.568L5.4 3.75H3a.75.75 0 0 1-.75-.75Zm4.5 16.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Zm9 0a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" />
                        </svg>
                      </button>
                      <button type="button" class="favorites-remove-btn" data-favorites-page-remove aria-label="Remove ${title}">×</button>
                    </div>
                  </div>
                </div>
              </div>
              ${detailRowsMarkup}
            </article>`;
          }).join('');

          favoritesItemsEl.innerHTML = itemsMarkup;
          favoritesActionsEl?.removeAttribute('hidden');
          favoritesEmptyCTA?.setAttribute('hidden', 'true');
        };

        favoritesItemsEl?.addEventListener('click', event => {
          const removeBtn = event.target.closest('[data-favorites-page-remove]');
          if (!removeBtn) return;
          const card = removeBtn.closest('[data-favorite-id]');
          if (!card) return;
          const id = card.getAttribute('data-favorite-id');
          favoritesApi.removeFavorite(id);
        });

        favoritesItemsEl?.addEventListener('click', async event => {
          const moveBtn = event.target.closest('[data-favorites-page-move]');
          if (!moveBtn) return;
          const card = moveBtn.closest('[data-favorite-id]');
          if (!card) return;
          const id = card.getAttribute('data-favorite-id');
          if (!id) return;
          moveBtn.setAttribute('disabled', 'true');
          setStatus('');
          const result = await favoritesApi.moveFavoriteToCart(id, { source: 'favorites-page' });
          moveBtn.removeAttribute('disabled');
          if (result?.ok) {
            setStatus('Item sent to cart');
          } else {
            setStatus(result?.user_message || 'Unable to move item to cart', true);
          }
        });

        clearBtn?.addEventListener('click', () => {
          favoritesApi.clearFavorites();
        });

        const unsubscribe = favoritesApi.subscribe(() => {
          renderFavorites();
        });
        window.addEventListener('beforeunload', () => {
          if (typeof unsubscribe === 'function') unsubscribe();
        }, { once: true });

        renderFavorites();
      })();
    </script>
  </body>
</html>
